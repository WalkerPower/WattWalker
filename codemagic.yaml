workflows:
  wattwalker-ios:
    name: WattWalker iOS
    max_build_duration: 120
    instance_type: mac_mini_m2
    environment:
      groups:
        - appstore_credentials
      vars:
        # Cloud Run backend URL - REQUIRED for bill analysis. Get from Cloud Run console after deploy.
        VITE_API_BASE_URL: $VITE_API_BASE_URL
        XCODE_PROJECT: App.xcodeproj
        XCODE_SCHEME: App
        APP_STORE_APP_ID: "6AR6G3NBJA"
        node: v22
        xcode: latest
        # REQUIRED: Add VITE_API_BASE_URL in Codemagic UI (Environment variables)
        # Set to your Cloud Run URL, e.g. https://wattwalker-njsolar-xxxxx-uc.a.run.app
        # Get it from: Google Cloud Console > Cloud Run > wattwalker-njsolar > URL
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
          source: true
    scripts:
      - name: Install dependencies
        script: npm ci
      - name: Build web app
        script: npm run build
      - name: Sync to iOS
        script: npx cap sync ios
      - name: Fetch signing files from App Store Connect
        script: |
          app-store-connect fetch-signing-files \
            --issuer-id "$APP_STORE_CONNECT_ISSUER_ID" \
            --key-id "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            --private-key "$APP_STORE_CONNECT_PRIVATE_KEY" \
            --type IOS_APP_STORE \
            --create \
            --delete-stale-profiles \
            "com.njsolar.wattwalker"
      - name: Set up code signing
        script: xcode-project use-profiles
      - name: Increment build number
        script: |
          cd $CM_BUILD_DIR/ios/App
          if [ -n "$BUILD_NUMBER" ] && [ "$BUILD_NUMBER" -gt 1 ]; then
            NEW_BUILD=$BUILD_NUMBER
          else
            NEW_BUILD=2
          fi
          agvtool new-version -all $NEW_BUILD
          echo "Set build number to $NEW_BUILD"
      - name: Build IPA
        script: |
          cd $CM_BUILD_DIR/ios/App
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - ios/App/build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
        submit_to_app_store: false
