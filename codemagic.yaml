workflows:
  wattwalker-ios:
    name: WattWalker iOS
    max_build_duration: 120
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: codemagic  # Must match the name in Teams > Integrations
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.walkerpower.wattwalker
      vars:
        XCODE_PROJECT: App.xcodeproj
        XCODE_SCHEME: App
        APP_STORE_APP_ID: "0"  # Replace with your App ID from App Store Connect > App > General > App Information
        node: v20
        xcode: latest
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
          source: true
    scripts:
      - name: Install dependencies
        script: npm ci
      - name: Build web app
        script: npm run build
      - name: Sync to iOS
        script: npx cap sync ios
      - name: Set up code signing
        script: xcode-project use-profiles
      - name: Increment build number
        script: |
          cd $CM_BUILD_DIR/ios/App
          LATEST_BUILD_NUMBER=$(app-store-connect get-latest-app-store-build-number "$APP_STORE_APP_ID" 2>/dev/null || echo "0")
          agvtool new-version -all $(($LATEST_BUILD_NUMBER + 1))
      - name: Build IPA
        script: |
          cd $CM_BUILD_DIR/ios/App
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - ios/App/build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false
